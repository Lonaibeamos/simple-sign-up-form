<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODIN</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="container">

<div class="first">

<div class="logo">
<img src="./odin-lined.png" alt="">
<span>ODIN</span>
</div>

<div class="credit">
<p>Photo by <a href="#">Author</a> on <a href="#">Unsplash</a></p>
</div>

</div>


<div class="second">

<h2>
This is not a realm online service! You know you need something<br>
like this in your life to help you realize your deepest dreams.<br>
Sign up <em>now</em> to get started.<br><br>
You <em>know</em> you want to
</h2>

<form action="https://httpbin.org/post" method="post">

<div class="bigdiv">

<h3>Let's do this!</h3>

<div class="container-1">

<div>
<label for="first_name">FIRST NAME</label>
<input type="text" id="first_name" name="first_name:" value="Thor">
</div>

<div>
<label for="second_name">LAST NAME</label>
<input type="text" id="second_name" name="last_name:" value="Odinson">
</div>

</div>


<div class="container-2">

<div>
<label for="email">EMAIL</label>
<input type="email" id="email" name="Email:" required>
</div>

<div>
<label for="phone_no">PHONE NUMBER</label>
<input type="tel" id="phone_no" name="Phone number:" requireds value="+(___)____-__-__">
</div>

</div>


<div class="container-3">

<div>
<label for="password">PASSWORD</label>
<input type="password" id="password" name="Password:" required minlength="4">
</div>

<div>
<label for="confirm_password">CONFIRM PASSWORD</label>
<input type="password" id="confirm_password" required minlength="4">
</div>

</div>

</div>


<div class="last">
<button>Create</button>
<p>Already have an account? <a href="#">Log in</a></p>

<input type="hidden" name="users_info" value="101">
</div>
</form>

</div>

</div>
<script>
const password = document.getElementById("password");
const confirmPassword = document.getElementById("confirm_password");

confirmPassword.addEventListener("input", function () {

    if (password.value !== confirmPassword.value) {
        confirmPassword.setCustomValidity("Passwords do not match");
    } else {
        confirmPassword.setCustomValidity("");
    }

});
</script>
</body>
</html>
